---
- name: Compute pre-action CVE statuses
  ansible.builtin.set_fact:
    cve_kernel_status_dirtyfrag_pre: >-
      {{
        'FIXED' if cve_kernel_dirtyfrag_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_dirtyfrag_fixed_ver, '>='))
        else ('MITIGATED' if cve_kernel_modprobe_present or cve_kernel_userns == '0' else 'VULNERABLE')
      }}
    cve_kernel_status_fragnesia_pre: >-
      {{
        'FIXED' if cve_kernel_fragnesia_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_fragnesia_fixed_ver, '>='))
        else ('MITIGATED' if cve_kernel_modprobe_present or cve_kernel_userns == '0' else 'VULNERABLE')
      }}
    cve_kernel_status_sshkeysign_pre: >-
      {{
        'FIXED' if cve_kernel_sshkeysign_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_sshkeysign_fixed_ver, '>='))
        else ('MITIGATED' if (cve_kernel_ptrace_scope | int >= 2) or cve_kernel_user_ptrace == '0' else 'VULNERABLE')
      }}
