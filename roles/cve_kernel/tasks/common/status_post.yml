---
- name: Compute post-action CVE statuses
  ansible.builtin.set_fact:
    cve_kernel_status_dirtyfrag_post: >-
      {{
        'FIXED' if cve_kernel_dirtyfrag_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_dirtyfrag_fixed_ver, '>='))
        else ('MITIGATED' if cve_kernel_modprobe_present_post or cve_kernel_userns_post == '0' else 'VULNERABLE')
      }}
    cve_kernel_status_fragnesia_post: >-
      {{
        'FIXED' if cve_kernel_fragnesia_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_fragnesia_fixed_ver, '>='))
        else ('MITIGATED' if cve_kernel_modprobe_present_post or cve_kernel_userns_post == '0' else 'VULNERABLE')
      }}
    cve_kernel_status_sshkeysign_post: >-
      {{
        'FIXED' if cve_kernel_sshkeysign_fixed_ver != 'unknown' and (cve_kernel_running_kernel is version(cve_kernel_sshkeysign_fixed_ver, '>='))
        else ('MITIGATED' if (cve_kernel_ptrace_scope_post | int >= 2) or cve_kernel_user_ptrace_post == '0' else 'VULNERABLE')
      }}

- name: Build host report
  ansible.builtin.set_fact:
    cve_kernel_fully_fixed: >-
      {{
        cve_kernel_status_dirtyfrag_post == 'FIXED' and
        cve_kernel_status_fragnesia_post == 'FIXED' and
        cve_kernel_status_sshkeysign_post == 'FIXED'
      }}
    cve_kernel_host_report:
      hostname: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      running_kernel: "{{ cve_kernel_running_kernel }}"
      installed_kernel: "{{ cve_kernel_newest_installed_kernel }}"
      reboot_needed: "{{ cve_kernel_running_kernel != cve_kernel_newest_installed_kernel }}"
      dirtyfrag: "{{ cve_kernel_status_dirtyfrag_post }}"
      fragnesia: "{{ cve_kernel_status_fragnesia_post }}"
      copyfail: "{{ cve_kernel_status_dirtyfrag_post }}"
      sshkeysign: "{{ cve_kernel_status_sshkeysign_post }}"
      nginx: "{{ 'CHECK_MANUALLY' if cve_kernel_nginx_present | bool else 'N/A' }}"
      ptrace_scope: "{{ cve_kernel_ptrace_scope_post }}"
      user_ptrace: "{{ cve_kernel_user_ptrace_post }}"
      modprobe: "{{ 'yes' if cve_kernel_modprobe_present_post else 'no' }}"
      reboot_reason: "{{ cve_kernel_reboot_reason | default('n/a') }}"
