---
- name: Check DirtyFrag modprobe mitigation file (post)
  ansible.builtin.stat:
    path: /etc/modprobe.d/disable-dirtyfrag.conf
  register: cve_kernel_modprobe_file_post

- name: Read ptrace sysctl (post)
  ansible.builtin.command: sysctl -n kernel.yama.ptrace_scope
  register: cve_kernel_ptrace_scope_raw_post
  changed_when: false
  failed_when: false

- name: Read CloudLinux user_ptrace sysctl (post)
  ansible.builtin.command: sysctl -n kernel.user_ptrace
  register: cve_kernel_user_ptrace_raw_post
  changed_when: false
  failed_when: false

- name: Read user namespace sysctl (post)
  ansible.builtin.command: sysctl -n user.max_user_namespaces
  register: cve_kernel_userns_raw_post
  changed_when: false
  failed_when: false

- name: Normalize mitigation signal values (post)
  ansible.builtin.set_fact:
    cve_kernel_ptrace_scope_post: "{{ cve_kernel_ptrace_scope_raw_post.stdout | default('0') | trim }}"
    cve_kernel_user_ptrace_post: "{{ cve_kernel_user_ptrace_raw_post.stdout | default('N/A') | trim }}"
    cve_kernel_userns_post: "{{ cve_kernel_userns_raw_post.stdout | default('65536') | trim }}"
    cve_kernel_modprobe_present_post: "{{ cve_kernel_modprobe_file_post.stat.exists | default(false) }}"
